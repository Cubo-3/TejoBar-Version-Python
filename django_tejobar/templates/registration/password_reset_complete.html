{% extends "layouts/public.html" %}

{% block title %}Contraseña Cambiada - TejoBar{% endblock %}

{% block extra_styles %}
<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
}
.auth-box {
    background: rgba(13, 13, 13, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 123, 0, 0.3);
    padding: 35px;
    border-radius: 20px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    color: white;
    text-align: center;
}
.btn-theme {
    background: linear-gradient(90deg, #ff7b00 0%, #e65c00 100%);
    border: none;
    border-radius: 25px;
    padding: 12px 30px;
    font-weight: bold;
    color: white !important;
    width: 100%;
    display: block;
    transition: all 0.3s ease;
}
.btn-theme:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255, 123, 0, 0.4);
}
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <div class="mb-4">
            <i class="fas fa-check-circle fa-3x text-success"></i>
        </div>
        <h3 class="font-weight-bold mb-3">¡Todo listo!</h3>
        <p class="text-muted mb-4">Tu contraseña ha sido restablecida. Ya puedes iniciar sesión.</p>
        <a href="{% url 'tejobar_app:login' %}" class="btn btn-theme">Iniciar Sesión</a>
    </div>
</div>
{% endblock %}
