{% extends "layouts/public.html" %}

{% block title %}Eliminar persona - TejoBar{% endblock %}

{% block content %}
<h1 class="mt-4">Eliminar persona</h1>
<p>¿Seguro que deseas eliminar a <strong>{{ persona.nombre }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'tejobar_app:personas_index' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
