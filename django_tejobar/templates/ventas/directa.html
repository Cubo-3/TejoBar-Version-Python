{% extends "dashboard/base.html" %}

{% block title %}Venta Física - TejoBar{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-cash-register mr-2"></i> Venta Física / Cliente sin cuenta</h2>
    <a href="{% url 'tejobar_app:admin_novedades_index' %}" class="btn btn-secondary">
        <i class="fas fa-arrow-left mr-1"></i> Volver al Log
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="fas fa-shopping-cart mr-2"></i> Registrar Venta</h5>
            </div>
            <div class="card-body bg-dark text-white p-4">

                {% if success %}
                <div class="alert alert-success">{{ success }}</div>
                {% endif %}
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="producto_id" class="form-label font-weight-bold">
                            <i class="fas fa-box mr-1"></i> Producto *
                        </label>
                        <select name="producto_id" id="producto_id" class="form-control" required>
                            <option value="">-- Selecciona un producto --</option>
                            {% for p in productos %}
                            <option value="{{ p.id }}">{{ p.nombre }} (Stock: {{ p.stock }}) — ${{ p.precio }}</option>
                            {% empty %}
                            <option disabled>No hay productos con stock disponible</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="cantidad" class="form-label font-weight-bold">
                            <i class="fas fa-hashtag mr-1"></i> Cantidad *
                        </label>
                        <input type="number" name="cantidad" id="cantidad" class="form-control"
                               min="1" value="1" required>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'tejobar_app:admin_novedades_index' %}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success font-weight-bold px-5">
                            <i class="fas fa-check mr-2"></i> Registrar Venta
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
